fixed:
  type: confluent
prompts:
  cloud_provider:
    hint: "eg: 'aws'"
    default: "aws"
  cloud_region:
    hint: "eg: us-west-1"
    default: "us-west-1"
  organization_id:
    hint: "eg: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
  compute_pool_id:
    hint: "eg: lfcp-xxxxx"
  environment_id:
    hint: "eg: env-xxxxxx"
  dbname:
    hint: "Database name"
  flink_api_key:
    hint: "Flink api key"
  flink_api_secret:
    hint: "Flink api secret"
    hide_input: true
  execution_mode:
    hint: "One of: 'snapshot', 'snapshot_ddl', 'streaming_query', 'streaming_ddl'"
    type: "string"
    default: 'streaming_query'
  statement_name_prefix:
    hint: "A prefix to prepend to each statement name"
    type: "string"
    default: "dbt-confluent-"
  statement_label:
    hint: "A user label applied to all statements"
    type: "string"
    default: "dbt-confluent"
  threads:
    hint: "1 or more"
    type: "int"
    default: 1
