version: v1.0
name: build-test-release
agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-1

auto_cancel:
  running:
    when: "branch != 'main'"

execution_time_limit:
  hours: 1

queue:
  - when: "branch != 'main'"
    processing: parallel

global_job_config:
  prologue:
    commands:
      - checkout
      - . vault-setup
      - git submodule update --init
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      - uv sync --dev

blocks:
  - name: "Lint"
    dependencies: []
    task:
      jobs:
        - name: "Ruff Check"
          commands:
            - uv run ruff check dbt/ tests/
        - name: "Ruff Format Check"
          commands:
            - uv run ruff format --check dbt/ tests/
        - name: "Changelog Check"
          commands:
            - |
              if [ "$SEMAPHORE_GIT_BRANCH" != "main" ]; then
                uv run towncrier check --compare-with origin/main
              else
                echo "Skipping changelog check on main"
              fi

  - name: "Build"
    dependencies: []
    task:
      jobs:
        - name: "Build Package"
          commands:
            - uv build
            # Install it locally and check that it can be imported.
            # Clean the venv created in the prologue first
            - uv venv --clear
            - uv pip install dist/dbt_confluent-*.whl
            - uv run python -c "import confluent_sql; import dbt.adapters.confluent; print('OK')"

  - name: "Test"
    dependencies:
      - "Lint"
      - "Build"
    task:
      jobs:
        - name: "Run Tests"
          commands:
            - |
              if [ -z "${CONFLUENT_FLINK_API_KEY:-}" ]; then
                echo "CONFLUENT_FLINK_API_KEY not set, skipping integration tests"
                uv run pytest tests/unit --junitxml=test-results.xml
              else
                uv run pytest --junitxml=test-results.xml
              fi
      epilogue:
        always:
          commands:
            - |
              if [[ -f test-results.xml ]]; then
                test-results publish test-results.xml
              fi

after_pipeline:
  task:
    jobs:
      - name: Publish Test Results to Semaphore
        commands:
          - test-results gen-pipeline-report || echo "Could not publish pipeline test result report. Are there any test results to publish?"

promotions:
  - name: Publish dbt-confluent to PyPi
    pipeline_file: publish_to_pypi.yml
